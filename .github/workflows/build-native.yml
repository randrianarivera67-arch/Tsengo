name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > android/app/google-services.json
            echo "=== google-services.json ecrit ==="
            ls -l android/app/google-services.json
            echo "--- package_name detecte ---"
            grep -o '"package_name": *"[^"]*"' android/app/google-services.json || echo "!! JSON INVALIDE (decode echoue)"
          else
            echo "!! secret GOOGLE_SERVICES_JSON MANQUANT"
            exit 1
          fi

      - name: Web build (pour cap sync)
        run: npm run build || (mkdir -p dist && echo '<!doctype html><title>Trengo</title>' > dist/index.html)

      - name: Capacitor sync
        run: npx cap sync android

      - name: Gradle assembleRelease
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint --stacktrace

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then echo "ERREUR: secret KEYSTORE_B64 manquant"; exit 1; fi
          echo "$KEYSTORE_B64" | base64 -d > key.jks
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK trouvé: $APK"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -f 4 "$APK" aligned.apk
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
            --ks key.jks --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEYSTORE_PASS" \
            --ks-key-alias trengo \
            --out trengo-native.apk aligned.apk

      - name: Create/Update GitHub Release (latest)
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Trengo — dernier build natif"
          body: "APK natif Trengo, généré automatiquement à chaque push sur main."
          artifacts: trengo-native.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Trengo-Native-APK
          path: trengo-native.apk
          if-no-files-found: error
