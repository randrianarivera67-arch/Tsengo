name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build TWA APK
        run: |
          sdkmanager "build-tools;33.0.2" "platforms;android-33" --sdk_root=$ANDROID_HOME

          mkdir -p twa/app/src/main/res/{mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,values}

          # ── Icône = logo Trengo depuis le repo (public/icon-512.png), toutes densités ──
          declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            convert public/icon-512.png -resize ${SIZES[$dir]}x${SIZES[$dir]} \
              twa/app/src/main/res/mipmap-$dir/ic_launcher.png
          done

          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "Trengo"
          include(":app")
          EOF

          cat > twa/build.gradle << 'EOF'
          plugins {
            id("com.android.application") version "8.1.4" apply false
          }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins {
            id("com.android.application")
          }
          android {
            compileSdk = 34
            namespace = "mg.tsengo.app"
            defaultConfig {
              applicationId = "mg.tsengo.app"
              minSdk = 21
              targetSdk = 34
              versionCode = 2
              versionName = "1.1"
            }
            buildTypes {
              debug { isDebuggable = true }
            }
          }
          dependencies {
            implementation("com.google.androidbrowserhelper:androidbrowserhelper:2.5.0")
          }
          EOF

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="Trengo"
              android:icon="@mipmap/ic_launcher"
              android:allowBackup="true"
              android:theme="@android:style/Theme.NoTitleBar">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://trengo-mg.vercel.app"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#E91E8C</color>
          </resources>
          EOF

          mkdir -p twa/gradle/wrapper
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" -o twa/gradlew
          chmod +x twa/gradlew
          find /usr -name "gradle-wrapper.jar" 2>/dev/null | head -1 | xargs -I{} cp {} twa/gradle/wrapper/gradle-wrapper.jar || true

          cd twa && ./gradlew assembleDebug --no-daemon -x lint

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          APK=$(find twa -name "*.apk" | head -1)
          echo "APK: $APK"
          if [ -z "$KEYSTORE_B64" ]; then echo "ERREUR: secret KEYSTORE_B64 manquant (voir instructions)"; exit 1; fi
          echo "$KEYSTORE_B64" | base64 -d > key.jks
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks key.jks --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEYSTORE_PASS" \
            --ks-key-alias trengo \
            --out trengo.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Trengo-APK
          path: trengo.apk
          if-no-files-found: error
