name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build TWA APK
        run: |
          sdkmanager "build-tools;33.0.2" "platforms;android-33" --sdk_root=$ANDROID_HOME

          mkdir -p twa/app/src/main/res/{mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,values}

          curl -sL "https://tsengo.onrender.com/tsengo-icon-192.png" -o /tmp/icon.png
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            cp /tmp/icon.png twa/app/src/main/res/mipmap-$dir/ic_launcher.png
          done

          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "Tsengo"
          include(":app")
          EOF

          cat > twa/build.gradle << 'EOF'
          plugins {
            id("com.android.application") version "8.1.4" apply false
          }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins {
            id("com.android.application")
          }
          android {
            compileSdk = 34
            namespace = "mg.tsengo.app"
            defaultConfig {
              applicationId = "mg.tsengo.app"
              minSdk = 21
              targetSdk = 34
              versionCode = 1
              versionName = "1.0"
            }
            buildTypes {
              debug { isDebuggable = true }
            }
          }
          dependencies {
            implementation("com.google.androidbrowserhelper:androidbrowserhelper:2.5.0")
          }
          EOF

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="Tsengo"
              android:icon="@mipmap/ic_launcher"
              android:allowBackup="true"
              android:theme="@android:style/Theme.NoTitleBar">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://tsengo.onrender.com"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#E91E8C</color>
          </resources>
          EOF

          mkdir -p twa/gradle/wrapper
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" -o twa/gradlew
          chmod +x twa/gradlew
          find /usr -name "gradle-wrapper.jar" 2>/dev/null | head -1 | xargs -I{} cp {} twa/gradle/wrapper/gradle-wrapper.jar || true

          cd twa && ./gradlew assembleDebug --no-daemon -x lint

      - name: Sign APK
        run: |
          APK=$(find twa -name "*.apk" | head -1)
          echo "APK: $APK"
          keytool -genkeypair -v -keystore key.jks -alias tsengo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tsengo123 -keypass tsengo123 \
            -dname "CN=Tsengo,O=Tsengo,C=MG" -noprompt
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks key.jks --ks-pass pass:tsengo123 \
            --key-pass pass:tsengo123 \
            --out tsengo.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tsengo-APK
          path: tsengo.apk
          if-no-files-found: error
